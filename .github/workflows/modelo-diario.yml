# ============================================================
# CORRIDA AUTOMATICA DIARIA
#  - Corre el modelo y agrega las predicciones a predicciones.csv
#  - Genera el JSON que alimenta la pagina de GitHub Pages (docs/)
#  - Commitea y pushea los resultados a main
# Horario: 16:30 UTC = 10:30am CDMX (cambia el cron si quieres otra hora)
# Tambien se puede disparar a mano: pestana Actions -> Modelo diario -> Run workflow
# Opcional: agrega el secret ODDS_API_KEY (Settings -> Secrets -> Actions)
# para que la corrida incluya deteccion de valor (+EV) contra el mercado.
# ============================================================

name: Modelo diario

on:
  schedule:
    - cron: "30 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: modelo-diario
  cancel-in-progress: false

jobs:
  correr:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr modelo (guarda predicciones.csv)
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python modelo_diario.py

      - name: Generar JSON para la pagina
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python generar_json.py

      - name: Commit y push de resultados
        run: |
          git config user.name "modelo-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predicciones.csv docs/data/
          if git diff --cached --quiet; then
            echo "Sin cambios que commitear."
          else
            git commit -m "Corrida automatica $(date -u +%F)"
            git push
          fi
