<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLB Modelo — Monte Carlo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-[Inter]">

  <header class="border-b border-slate-700 bg-slate-800/50 backdrop-blur sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <div>
        <h1 class="text-xl font-bold text-white tracking-tight">⚾ MLB Modelo</h1>
        <p class="text-xs text-slate-400 mt-0.5">Simulador Monte Carlo — v3</p>
      </div>
      <div class="flex items-center gap-3 text-sm text-slate-400">
        <span id="status-indicator" class="flex items-center gap-1.5">
          <span class="w-2 h-2 rounded-full bg-slate-600"></span>
          Listo
        </span>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-6">

    <!-- Controls -->
    <div class="bg-slate-800 rounded-2xl p-5 border border-slate-700 shadow-lg mb-6">
      <div class="flex flex-col sm:flex-row items-start sm:items-end gap-4">
        <div class="flex-1 w-full sm:w-auto">
          <label for="fecha" class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-1.5">Fecha</label>
          <input type="date" id="fecha"
                 class="w-full sm:w-56 bg-slate-700 border border-slate-600 rounded-lg px-3 py-2.5 text-sm text-white
                        focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                        [color-scheme:dark]">
        </div>
        <div class="flex gap-2 w-full sm:w-auto">
          <button id="btn-run"
                  class="flex-1 sm:flex-none bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-semibold
                         px-6 py-2.5 rounded-lg transition-all duration-150 shadow-lg shadow-blue-600/20
                         disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-blue-600">
            <span class="flex items-center justify-center gap-2">
              <svg id="spinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
              </svg>
              <span id="btn-text">Correr modelo</span>
            </span>
          </button>
          <button id="btn-hoy"
                  class="bg-slate-700 hover:bg-slate-600 text-slate-300 px-3 py-2.5 rounded-lg text-sm transition-colors"
                  title="Hoy">📅</button>
        </div>
      </div>
      <div id="calibracion-info" class="mt-3 hidden">
        <p class="text-xs text-slate-500 font-mono"></p>
      </div>
    </div>

    <!-- Loading skeleton -->
    <div id="skeleton" class="hidden space-y-4">
      <div class="h-8 bg-slate-800 rounded-lg w-48 animate-pulse"></div>
      <div class="grid gap-4 md:grid-cols-2">
        <div class="bg-slate-800 rounded-2xl p-5 border border-slate-700 animate-pulse">
          <div class="h-5 bg-slate-700 rounded w-3/4 mb-4"></div>
          <div class="space-y-2">
            <div class="h-3 bg-slate-700 rounded w-full"></div>
            <div class="h-3 bg-slate-700 rounded w-5/6"></div>
            <div class="h-3 bg-slate-700 rounded w-4/6"></div>
          </div>
        </div>
        <div class="bg-slate-800 rounded-2xl p-5 border border-slate-700 animate-pulse">
          <div class="h-5 bg-slate-700 rounded w-3/4 mb-4"></div>
          <div class="space-y-2">
            <div class="h-3 bg-slate-700 rounded w-full"></div>
            <div class="h-3 bg-slate-700 rounded w-5/6"></div>
            <div class="h-3 bg-slate-700 rounded w-4/6"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Results -->
    <div id="resultados" class="hidden space-y-6">

      <!-- Slate summary -->
      <div id="slate-summary" class="flex flex-wrap items-center gap-3 text-sm">
        <span class="bg-blue-900/40 text-blue-300 px-3 py-1 rounded-full text-xs font-medium border border-blue-800/50"></span>
        <span class="bg-emerald-900/40 text-emerald-300 px-3 py-1 rounded-full text-xs font-medium border border-emerald-800/50"></span>
        <span class="bg-amber-900/40 text-amber-300 px-3 py-1 rounded-full text-xs font-medium border border-amber-800/50"></span>
      </div>

      <!-- Game cards -->
      <div id="game-cards" class="grid gap-5 md:grid-cols-2"></div>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="hidden text-center py-16">
      <div class="text-5xl mb-4">📋</div>
      <p class="text-slate-400 text-lg">Selecciona una fecha y presiona <strong class="text-white">Correr modelo</strong></p>
      <p class="text-slate-500 text-sm mt-1">Se mostrarán aquí las predicciones del día</p>
    </div>

    <!-- Error -->
    <div id="error" class="hidden bg-red-900/30 border border-red-800/50 rounded-xl p-4 text-red-300 text-sm"></div>

  </main>

  <footer class="border-t border-slate-800 mt-12 py-4 text-center text-xs text-slate-600">
    MLB Modelo · Simulador Monte Carlo · Datos via MLB StatsAPI
  </footer>

<script>
const btnRun = document.getElementById('btn-run');
const btnHoy = document.getElementById('btn-hoy');
const btnText = document.getElementById('btn-text');
const spinner = document.getElementById('spinner');
const fechaInput = document.getElementById('fecha');
const resultados = document.getElementById('resultados');
const gameCards = document.getElementById('game-cards');
const skeleton = document.getElementById('skeleton');
const emptyState = document.getElementById('empty-state');
const errorDiv = document.getElementById('error');
const slateSummary = document.getElementById('slate-summary');
const calibInfo = document.getElementById('calibracion-info');
const statusInd = document.getElementById('status-indicator');

function fmtFecha(d) {
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const yyyy = d.getFullYear();
  return `${yyyy}-${mm}-${dd}`;
}

function toAPI(f) {
  const [y,m,d] = f.split('-');
  return `${m}/${d}/${y}`;
}

function toDisplay(f) {
  const [y,m,d] = f.split('-');
  return `${m}/${d}/${y}`;
}

fechaInput.value = fmtFecha(new Date());
emptyState.classList.remove('hidden');

btnHoy.addEventListener('click', () => {
  fechaInput.value = fmtFecha(new Date());
});

btnRun.addEventListener('click', correr);

async function correr() {
  const fecha = fechaInput.value;
  if (!fecha) return;

  btnRun.disabled = true;
  spinner.classList.remove('hidden');
  btnText.textContent = 'Ejecutando...';
  resultados.classList.add('hidden');
  errorDiv.classList.add('hidden');
  emptyState.classList.add('hidden');
  skeleton.classList.remove('hidden');

  statusInd.innerHTML = `<span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span> Simulando...`;

  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 300000);

  try {
    const res = await fetch('/api/simular', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fecha: toAPI(fecha) }),
      signal: controller.signal,
    });
    clearTimeout(timeoutId);
    if (!res.ok) throw new Error(`Error ${res.status}: ${await res.text()}`);
    const data = await res.json();
    renderResultados(data, fecha);
  } catch (err) {
    clearTimeout(timeoutId);
    errorDiv.textContent = '⚠ ' + (err.name === 'AbortError' ? 'La simulación tardó demasiado (>60s). Reintenta o revisa la conexión a las APIs.' : err.message);
    errorDiv.classList.remove('hidden');
    resultados.classList.add('hidden');
    emptyState.classList.add('hidden');
    statusInd.innerHTML = `<span class="w-2 h-2 rounded-full bg-red-500"></span> Error`;
  } finally {
    skeleton.classList.add('hidden');
    btnRun.disabled = false;
    spinner.classList.add('hidden');
    btnText.textContent = 'Correr modelo';
  }
}

function pct(p) { return (p * 100).toFixed(1) + '%'; }

function momio(p) {
  if (p <= 0.01 || p >= 0.99) return '—';
  if (p >= 0.5) return String(-Math.round(100 * p / (1 - p)));
  return '+' + String(Math.round(100 * (1 - p) / p));
}

function barra(p, color = 'blue') {
  const colors = {
    blue: 'bg-blue-500',
    emerald: 'bg-emerald-500',
    amber: 'bg-amber-500',
    violet: 'bg-violet-500',
    rose: 'bg-rose-500',
    cyan: 'bg-cyan-500',
  };
  return `
    <div class="w-full bg-slate-700 rounded-full h-2 overflow-hidden mt-1">
      <div class="${colors[color] || colors.blue} h-2 rounded-full transition-all duration-500" style="width:${pct(p)}"></div>
    </div>`;
}

function renderResultados(data, fecha) {
  resultados.classList.remove('hidden');
  gameCards.innerHTML = '';

  const total = data.juegos.length;
  const promedio = data.total_promedio_slate;
  const valor = data.total_jugadas_valor;

  const spans = slateSummary.querySelectorAll('span');
  spans[0].textContent = `🎮 ${total} juegos modelables`;
  spans[1].textContent = `📊 Total slate: ${promedio ?? '—'}`;
  spans[2].textContent = `💰 ${valor} jugadas +EV`;

  calibInfo.classList.remove('hidden');
  const c = data.calibracion;
  calibInfo.querySelector('p').textContent =
    `amortigua=${c.amortigua} · dispersion_k=${c.dispersion_k} · base=${c.base} · ${data.hay_odds ? 'con líneas de mercado' : 'sin ODDS_API_KEY'}`;

  if (total === 0) {
    gameCards.innerHTML = `
      <div class="col-span-full text-center py-12 bg-slate-800/50 rounded-2xl border border-slate-700">
        <div class="text-4xl mb-3">🔮</div>
        <p class="text-slate-400">No hay juegos modelables para esta fecha</p>
        <p class="text-slate-500 text-xs mt-1">(sin abridores anunciados o todos ya iniciados)</p>
      </div>`;
    return;
  }

  for (const g of data.juegos) {
    const card = document.createElement('div');
    card.className = 'bg-slate-800 rounded-2xl border border-slate-700 shadow-lg overflow-hidden';

    let valorHTML = '';
    if (g.jugadas_valor.length) {
      valorHTML = `
        <div class="bg-emerald-900/20 border-t border-emerald-800/30 px-5 py-3">
          <p class="text-xs font-semibold text-emerald-400 uppercase tracking-wider mb-2">💰 Jugadas con valor</p>
          ${g.jugadas_valor.map(j => `
            <div class="flex items-center justify-between text-sm bg-emerald-900/20 rounded-lg px-3 py-1.5 mb-1 last:mb-0">
              <span class="text-emerald-200">
                ${j.mercado} <strong>${j.pick}</strong>${j.linea ? ' ' + j.linea : ''}
                <span class="text-slate-400">· ${j.libro}</span>
              </span>
              <span class="font-mono text-emerald-300">${j.momio > 0 ? '+' : ''}${j.momio}</span>
            </div>
          `).join('')}
        </div>`;
    }

    card.innerHTML = `
      <div class="p-5">
        <!-- Teams -->
        <div class="flex items-center justify-between mb-4">
          <div class="flex-1 min-w-0">
            <p class="text-xs text-slate-500 uppercase tracking-wide">Visita</p>
            <p class="text-lg font-bold text-white truncate">${g.visita}</p>
            <p class="text-xs text-slate-400 truncate">${g.abridor_v}</p>
            <div class="flex gap-2 mt-1 text-xs text-slate-500">
              <span>FIP ${g.fip_v ?? '—'}</span>
              <span>${g.ip_v ?? '—'}IP</span>
              <span>${g.mano_v ?? '?'}</span>
            </div>
          </div>
          <div class="text-center px-3">
            <p class="text-2xl font-extrabold text-white">@</p>
            <p class="text-[10px] text-slate-500 mt-1">${g.park.toFixed(2)} PF</p>
          </div>
          <div class="flex-1 min-w-0 text-right">
            <p class="text-xs text-slate-500 uppercase tracking-wide">Casa</p>
            <p class="text-lg font-bold text-white truncate">${g.casa}</p>
            <p class="text-xs text-slate-400 truncate">${g.abridor_c}</p>
            <div class="flex justify-end gap-2 mt-1 text-xs text-slate-500">
              <span>${g.mano_c ?? '?'}</span>
              <span>${g.ip_c ?? '—'}IP</span>
              <span>FIP ${g.fip_c ?? '—'}</span>
            </div>
          </div>
        </div>

        <!-- Moneyline -->
        <div class="mb-4">
          <div class="flex justify-between text-xs text-slate-400 mb-1">
            <span>${g.visita} ${pct(g.p_visita)} (${momio(g.p_visita)})</span>
            <span class="font-medium text-white">Moneyline</span>
            <span>${g.casa} ${pct(g.p_casa)} (${momio(g.p_casa)})</span>
          </div>
          ${barra(g.p_casa, 'blue')}
        </div>

        <!-- Run line -->
        <div class="mb-4">
          <div class="flex justify-between text-xs text-slate-400 mb-1">
            <span>+1.5 ${pct(g.p_visita_rl)}</span>
            <span class="font-medium text-white">Run Line</span>
            <span>-1.5 ${pct(g.p_casa_rl)}</span>
          </div>
          ${barra(g.p_casa_rl, 'violet')}
        </div>

        <!-- Overs -->
        <div class="mb-3">
          <p class="text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wide">Totales</p>
          <div class="grid grid-cols-4 gap-1.5 text-center text-xs">
            ${Object.entries(g.overs).map(([ln, p]) => `
              <div class="bg-slate-700/50 rounded-lg py-1.5 ${p > 0.5 ? 'ring-1 ring-amber-600/40' : ''}">
                <span class="text-slate-500">O${ln}</span>
                <span class="block font-semibold text-amber-300">${pct(p)}</span>
              </div>
            `).join('')}
          </div>
        </div>

        <!-- F5 Section -->
        <details class="group">
          <summary class="text-xs text-slate-500 cursor-pointer hover:text-slate-300 transition-colors select-none
                         flex items-center gap-1.5 py-1">
            <svg class="w-3 h-3 transition-transform group-open:rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
            Primeras 5 entradas (F5)
          </summary>
          <div class="mt-2 pt-3 border-t border-slate-700/50 space-y-2">
            <div class="flex justify-between text-xs text-slate-400 mb-1">
              <span>${g.visita} ${pct(g.f5.p_visita)}</span>
              <span class="font-medium text-white">ML 3 vías</span>
              <span>${g.casa} ${pct(g.f5.p_casa)}</span>
            </div>
            <div class="text-center text-xs text-slate-500 mb-1">Empate ${pct(g.f5.p_empate)}</div>
            ${barra(g.f5.p_casa, 'cyan')}
            <div class="flex justify-between text-xs text-slate-400">
              <span>RL +0.5 ${pct(g.f5.rl_visita)}</span>
              <span class="font-medium text-white">F5 Run Line</span>
              <span>RL -0.5 ${pct(g.f5.rl_casa)}</span>
            </div>
            <div class="grid grid-cols-3 gap-1.5 text-center text-xs mt-2">
              ${Object.entries(g.f5.overs).map(([ln, p]) => `
                <div class="bg-slate-700/50 rounded-lg py-1.5 ${p > 0.5 ? 'ring-1 ring-amber-600/40' : ''}">
                  <span class="text-slate-500">O${ln}</span>
                  <span class="block font-semibold text-amber-300">${pct(p)}</span>
                </div>
              `).join('')}
            </div>
          </div>
        </details>

        <!-- Bateo Section -->
        <details class="group mt-1">
          <summary class="text-xs text-slate-500 cursor-pointer hover:text-slate-300 transition-colors select-none
                         flex items-center gap-1.5 py-1">
            <svg class="w-3 h-3 transition-transform group-open:rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
            Pronóstico de Hits por Bateador
          </summary>
          <div class="mt-2 pt-3 border-t border-slate-700/50 space-y-3">
            ${g.bateo ? ['away', 'home'].map(lado => {
              const label = lado === 'away' ? g.visita : g.casa;
              const color = lado === 'away' ? 'blue' : 'rose';
              const bateadores = g.bateo[lado] || [];
              if (!bateadores.length) return '';
              return `
                <div>
                  <p class="text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wide">${label}</p>
                  <div class="overflow-x-auto">
                    <table class="w-full text-xs">
                      <thead>
                        <tr class="text-slate-500 border-b border-slate-700/50">
                          <th class="text-left py-1 pr-2">#</th>
                          <th class="text-left py-1 pr-2">Bateador</th>
                          <th class="text-left py-1 pr-2">Pos</th>
                          <th class="text-left py-1 pr-2">Mano</th>
                          <th class="text-right py-1 pr-2">AVG</th>
                          <th class="text-right py-1 pr-2">OPS</th>
                          <th class="text-right py-1 pr-2">Últ 7d</th>
                          <th class="text-right py-1 pr-2">BABIP</th>
                          <th class="text-right py-1 pr-2 text-amber-300">Avg Esp</th>
                          <th class="text-right py-1 pr-2 text-amber-300">Hits Esp</th>
                          <th class="text-right py-1 text-emerald-400">≥1 Hit</th>
                        </tr>
                      </thead>
                      <tbody>
                        ${bateadores.map(b => `
                          <tr class="border-b border-slate-800/50 hover:bg-slate-700/20">
                            <td class="py-1 pr-2 text-slate-500">${b.orden}</td>
                            <td class="py-1 pr-2 text-white font-medium truncate max-w-[120px]">${b.nombre}</td>
                            <td class="py-1 pr-2 text-slate-400">${b.posicion}</td>
                            <td class="py-1 pr-2 text-slate-400">${b.bat_side || '?'}</td>
                            <td class="py-1 pr-2 text-right text-slate-300">${b.avg_season || '—'}</td>
                            <td class="py-1 pr-2 text-right text-slate-300">${b.ops_season || '—'}</td>
                            <td class="py-1 pr-2 text-right text-slate-300">${b.avg_7d ? b.avg_7d.toFixed(3) : '—'}</td>
                            <td class="py-1 pr-2 text-right text-slate-300">${b.babip || '—'}</td>
                            <td class="py-1 pr-2 text-right font-semibold text-amber-300">${b.prediccion.avg_pred.toFixed(3)}</td>
                            <td class="py-1 pr-2 text-right font-semibold text-amber-300">${b.prediccion.hits_esp.toFixed(1)}</td>
                            <td class="py-1 pr-2 text-right font-semibold text-emerald-400">${pct(b.prediccion.p_hit_1 + b.prediccion.p_hit_2)}</td>
                          </tr>
                        `).join('')}
                      </tbody>
                    </table>
                  </div>
                </div>`;
            }).join('') : `
              <p class="text-xs text-slate-500 italic py-2">Alineación no disponible aún (se anuncia ~1h antes del juego)</p>`}
          </div>
        </details>
      </div>
      ${valorHTML}
    `;
    gameCards.appendChild(card);
  }

  statusInd.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500"></span> ${data.juegos.length} juegos`;
}
</script>

</body>
</html>
